services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aftersale_postgres
    environment:
      POSTGRES_USER: aftersale
      POSTGRES_PASSWORD: aftersale
      POSTGRES_DB: aftersale_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: aftersale_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: